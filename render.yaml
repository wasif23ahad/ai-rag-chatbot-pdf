# ==============================================================================
# render.yaml — Render Blueprint for RAG Document Chatbot (Monorepo)
# ==============================================================================
# Place this file at the ROOT of your Git repository.
# Render reads it to auto-provision both services on "New Blueprint Instance".
#
# Free tier notes:
#   - Services spin down after 15 min of inactivity (cold start ~30s)
#   - 750 instance-hours/month shared across all free services
#   - Filesystem is ephemeral (FAISS index lost on restart — rebuilt on upload)
# ==============================================================================

services:
  # Backend has been successfully migrated to Hugging Face Spaces to bypass Render's 512MB RAM limit.
  # Do not deploy the backend on Render anymore.

  # --------------------------------------------------------------------------
  # Frontend — React (Vite build) + Nginx
  # --------------------------------------------------------------------------
  - type: web
    name: rag-chatbot-frontend
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # Backend URL for Nginx reverse proxy
      # Update this after the backend is deployed with its actual URL
      - key: BACKEND_URL
        value: "https://rag-chatbot-backend.onrender.com"
      # Vite build-time var (empty = same-origin via Nginx proxy)
      - key: VITE_API_URL
        value: ""
